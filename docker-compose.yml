services:
  db:
    image: pgvector/pgvector:pg17
    container_name: postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: tourbillon
      POSTGRES_USER: ${POSTGRES_USER:-tourbillon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tourbillon}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "5248:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=ep-lucky-fog-a7stpbyi-pooler.ap-southeast-2.aws.neon.tech;Port=5432;Username=neondb_owner;Password=npg_K6JYeMRBa5fL;Database=neondb;Ssl Mode=Require"
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME:-}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY:-}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET:-}
      Smtp__Username: ${SMTP_USERNAME:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      AiService__BaseUrl: http://ai-service:5000
    volumes:
      - backend-images:/app/Images
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/brand"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai-service:
    build: ./ai-service
    container_name: qwen2.5-7b
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      FLASK_ENV: production
      LLM_BASE_URL: http://localhost:11434/v1
      LLM_MODEL: qwen2.5:7b
      BASE_LLM_MODEL: ${BASE_LLM_MODEL:-qwen2.5:7b}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      OLLAMA_FLASH_ATTENTION: 1
      OLLAMA_KEEP_ALIVE: -1
      OLLAMA_MAX_LOADED_MODELS: 2

volumes:
  pgdata:
  backend-images:
  ollama_data:
