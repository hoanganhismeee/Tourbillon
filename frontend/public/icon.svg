<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 64 180 180" aria-label="Tourbillon">

  <!-- ── CASE & BEZEL (CY=153, CX=100) ─────────────────── -->
  <circle cx="100" cy="153" r="89" fill="#1c1006"/>
  <circle cx="100" cy="153" r="88" fill="none" stroke="#6a3810" stroke-width="3"/>
  <!-- Bright gold bezel rim -->
  <circle cx="100" cy="153" r="85" fill="none" stroke="#f5c040" stroke-width="4"   stroke-opacity="0.92"/>
  <circle cx="100" cy="153" r="86" fill="none" stroke="#fde8a0" stroke-width="1"   stroke-opacity="0.45"/>
  <circle cx="100" cy="153" r="82" fill="none" stroke="#f5c040" stroke-width="0.7" stroke-opacity="0.35"/>
  <circle cx="100" cy="153" r="81" fill="none" stroke="#a07030" stroke-width="0.6" stroke-opacity="0.50"/>

  <!-- ── DIAL ──────────────────────────────────────────── -->
  <circle cx="100" cy="153" r="80" fill="#160c04"/>
  <circle cx="100" cy="153" r="77" fill="none" stroke="#f5c040" stroke-width="0.7" stroke-opacity="0.30"/>
  <!-- Inner complication zone -->
  <circle cx="100" cy="153" r="47" fill="#110803" fill-opacity="0.92"/>
  <circle cx="100" cy="153" r="47" fill="none" stroke="#f5c040" stroke-width="1.4" stroke-opacity="0.60"/>

  <!-- ── HOUR INDICES ──────────────────────────────────── -->
  <rect x="96" y="75.5" width="8" height="14" rx="1" fill="#f5c040" fill-opacity="0.96" transform="rotate(0,100,153)"/>
  <rect x="96" y="75.5" width="8" height="14" rx="1" fill="#f5c040" fill-opacity="0.96" transform="rotate(90,100,153)"/>
  <rect x="96" y="75.5" width="8" height="14" rx="1" fill="#f5c040" fill-opacity="0.96" transform="rotate(180,100,153)"/>
  <rect x="96" y="75.5" width="8" height="14" rx="1" fill="#f5c040" fill-opacity="0.96" transform="rotate(270,100,153)"/>
  <rect x="98.5" y="78.5" width="3" height="8" rx="0.5" fill="#f5c040" fill-opacity="0.55" transform="rotate(30,100,153)"/>
  <rect x="98.5" y="78.5" width="3" height="8" rx="0.5" fill="#f5c040" fill-opacity="0.55" transform="rotate(60,100,153)"/>
  <rect x="98.5" y="78.5" width="3" height="8" rx="0.5" fill="#f5c040" fill-opacity="0.55" transform="rotate(120,100,153)"/>
  <rect x="98.5" y="78.5" width="3" height="8" rx="0.5" fill="#f5c040" fill-opacity="0.55" transform="rotate(150,100,153)"/>
  <rect x="98.5" y="78.5" width="3" height="8" rx="0.5" fill="#f5c040" fill-opacity="0.55" transform="rotate(210,100,153)"/>
  <rect x="98.5" y="78.5" width="3" height="8" rx="0.5" fill="#f5c040" fill-opacity="0.55" transform="rotate(240,100,153)"/>
  <rect x="98.5" y="78.5" width="3" height="8" rx="0.5" fill="#f5c040" fill-opacity="0.55" transform="rotate(300,100,153)"/>
  <rect x="98.5" y="78.5" width="3" height="8" rx="0.5" fill="#f5c040" fill-opacity="0.55" transform="rotate(330,100,153)"/>

  <!-- ── SUB-DIALS ────────── -->
  <!-- 9 o'clock at (53,153) -->
  <circle cx="53" cy="153" r="15" fill="#0e0703"/>
  <circle cx="53" cy="153" r="15" fill="none" stroke="#f5c040" stroke-width="1.3" stroke-opacity="0.65"/>
  <circle cx="53" cy="153" r="10" fill="none" stroke="#f5c040" stroke-width="0.6" stroke-opacity="0.30"/>
  <g transform="translate(53,153) rotate(110)">
    <line x1="0" y1="-12" x2="0" y2="0" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="1"   x2="0" y2="5" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.35"/>
  </g>
  <circle cx="53" cy="153" r="2.5" fill="#f5c040"/>

  <!-- 6 o'clock at (100,200) -->
  <circle cx="100" cy="200" r="15" fill="#0e0703"/>
  <circle cx="100" cy="200" r="15" fill="none" stroke="#f5c040" stroke-width="1.3" stroke-opacity="0.65"/>
  <circle cx="100" cy="200" r="10" fill="none" stroke="#f5c040" stroke-width="0.6" stroke-opacity="0.30"/>
  <g transform="translate(100,200) rotate(250)">
    <line x1="0" y1="-12" x2="0" y2="0" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="1"   x2="0" y2="5" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.35"/>
  </g>
  <circle cx="100" cy="200" r="2.5" fill="#f5c040"/>

  <!-- 3 o'clock at (147,153) -->
  <circle cx="147" cy="153" r="15" fill="#0e0703"/>
  <circle cx="147" cy="153" r="15" fill="none" stroke="#f5c040" stroke-width="1.3" stroke-opacity="0.65"/>
  <circle cx="147" cy="153" r="10" fill="none" stroke="#f5c040" stroke-width="0.6" stroke-opacity="0.30"/>
  <g transform="translate(147,153) rotate(70)">
    <line x1="0" y1="-12" x2="0" y2="0" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="1"   x2="0" y2="5" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.35"/>
  </g>
  <circle cx="147" cy="153" r="2.5" fill="#f5c040"/>

  <!-- ── HOUR HAND — white dauphine, 10 o'clock (rotate -60°) ── -->
  <g transform="translate(100,153) rotate(-60)">
    <polygon points="0,-52 6,-20 2,0 -2,0 -6,-20" fill="#ffffff" fill-opacity="0.96"/>
    <line x1="0" y1="-52" x2="0" y2="0" stroke="#f5c040" stroke-width="0.8" stroke-linecap="round" stroke-opacity="0.50"/>
    <polygon points="-2,0 2,0 3,10 0,14 -3,10" fill="#ffffff" fill-opacity="0.40"/>
  </g>

  <!-- ── MINUTE HAND — white dauphine, 2 o'clock (rotate +60°) ── -->
  <g transform="translate(100,153) rotate(60)">
    <polygon points="0,-68 4,-32 1.5,0 -1.5,0 -4,-32" fill="#ffffff" fill-opacity="0.93"/>
    <line x1="0" y1="-68" x2="0" y2="0" stroke="#f5c040" stroke-width="0.6" stroke-linecap="round" stroke-opacity="0.45"/>
    <polygon points="-1.5,0 1.5,0 2.5,9 0,12 -2.5,9" fill="#ffffff" fill-opacity="0.40"/>
  </g>

  <!-- ── CENTER CAP ─────────────────────────────────────── -->
  <circle cx="100" cy="153" r="7"   fill="#1c1006"/>
  <circle cx="100" cy="153" r="5"   fill="#f5c040" fill-opacity="0.90"/>
  <circle cx="100" cy="153" r="2.5" fill="#ffffff"/>

</svg>
