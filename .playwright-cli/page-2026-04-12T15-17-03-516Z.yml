        - generic [ref=e258]:
          - 'img "Graceful and luminous, the 4997/200G-001 brings jewellery-like refinement to the Calatrava without compromising its essential restraint. The blue dial gives the watch a richer emotional tone, while the diamond-set case adds light and texture in a way that feels elegant rather than excessive. What makes it compelling is its balance: feminine, polished, and unmistakably precious, yet still rooted in the calm, disciplined design language that defines the house." [ref=e261]'
          - img "Vintage sensibility is reinterpreted with quiet confidence in the 5226G-001, a watch whose charm comes from atmosphere as much as design. The textured case flank and softly grained dial give it a more tactile, lived-in personality, setting it apart from the smoother formality often associated with Patek Philippe. It feels thoughtful, relaxed, and slightly adventurous, as though designed for someone who appreciates heritage most when it is made to feel personal and contemporary." [ref=e264]
          - img "Cool restraint gives the 5738P-001 a quietly magnetic presence, proving that the Golden Ellipse does not need ornament to leave an impression. Its allure comes from proportion, surface, and tone, all working together with remarkable discipline. The result feels deeply refined, almost architectural, yet never severe. It is a watch for someone drawn to elegance that is intellectual rather than decorative, and confident enough to remain beautifully understated." [ref=e267]
          - img "Classic watchmaking is distilled with uncommon purity in the 6119R-001, a piece that finds richness not in complication, but in detail, proportion, and finish. Its standout feature is the hobnail bezel, a historic Calatrava signature that adds texture and identity to an otherwise restrained silhouette. The result is deeply elegant but never plain, offering the kind of old-world sophistication that feels enduring precisely because it avoids chasing novelty." [ref=e270]
          - 'img "Understated elegance meets old-world charm in the Calatrava 5227G. Crafted in 18k white gold, its clean ivory lacquer dial hides a secret: a hinged officer-style caseback, paying tribute to horological heritage. With automatic movement and date functionality, this 39 mm timepiece is ideal for the refined gentleman seeking discretion, comfort, and enduring Patek Philippe craftsmanship in one seamless design." [ref=e273]'
          - img "Modern energy runs through the 6007G-010, where a more graphic, youthful dial language brings fresh attitude to a traditionally elegant house. It feels sharper and more urban than many classic Patek Philippe references, with contrasting details that create rhythm and visual tension without sacrificing balance. What makes it interesting is this deliberate shift in tone, still refined, still controlled, but with a sportier pulse that gives the watch a more contemporary voice." [ref=e276]
      - generic [ref=e92]:
        - generic [ref=e277]:
          - img "Artistry takes precedence in the 86073/000P-H066, where watchmaking becomes a canvas for storytelling through the Chinese zodiac. The Year of the Horse motif brings movement, symbolism, and hand-finished detail into a piece that feels closer to objet d’art than conventional wristwatch. It is defined less by utility than by cultural richness, crafted for collectors who value rare métiers d’art as deeply as traditional horology." [ref=e280]
          - img "The Métiers d’Art Tribute to Explorer Naturalists captures the spirit of 19th-century scientific voyages through a richly layered enamel dial that blends cartography, wildlife, and maritime exploration into a single composition. Inspired by the journeys of naturalists aboard historic expeditions, it combines hand-engraving and Grand Feu enamel on a two-level dial, creating depth and narrative rarely seen in watchmaking. The pink gold case frames this miniature artwork with classical restraint, while the wandering hours display adds a dynamic and unconventional way of reading time. Produced in extremely limited numbers, it stands as a fusion of horology and fine art, transforming historical storytelling into a mechanical and visual experience." [ref=e283]
          - img "The Métiers d'Art Tribute to Great Civilisations translates ancient artistry into horological form, showcasing a sculpted dial inspired by historical relics through engraving, enameling, and bas-relief techniques. The white gold case frames a dial that functions as a three-dimensional canvas, where each detail is crafted by hand to recreate cultural symbols with remarkable depth. Beneath the artistic exterior lies a refined automatic movement, balancing visual storytelling with mechanical precision. Produced in highly limited numbers, it reflects a commitment to preserving heritage through the language of haute horlogerie." [ref=e286]
          - img "The Métiers d'Art collection transforms traditional craftsmanship into a refined and expressive timepiece, where intricate engraving and enamel work elevate the dial into a piece of wearable art. The white gold case frames a composition of delicate motifs and textures, creating depth while maintaining an elegant and balanced aesthetic. Powered by an automatic movement, it delivers both precision and practicality beneath its artistic surface. Produced in limited numbers, it reflects Vacheron Constantin's dedication to preserving rare métiers while integrating them into contemporary watchmaking." [ref=e289]
          - img "The Métiers d'Art Tribute to Explorer Naturalists presents a poetic interpretation of exploration through a white gold case paired with a vividly detailed enamel dial, where engraved motifs and painted scenes evoke the discoveries of early naturalists. Built around a two-level construction, it integrates traditional métiers with a wandering hours display, turning timekeeping into a dynamic visual experience. The use of Grand Feu enamel and hand-crafted elements creates a sense of depth and realism, while the automatic movement ensures mechanical refinement beneath its artistic surface. Produced in extremely limited numbers, it stands as both a horological complication and a narrative object rooted in history." [ref=e292]
          - img "The Métiers d'Art Tribute to Great Civilisations reinterprets ancient iconography through a dial sculpted with exceptional depth and detail, combining engraving and enamel techniques to create a miniature work of art. Encased in white gold, the watch transforms historical motifs into a contemporary expression of craftsmanship, where each element is executed by hand with remarkable precision. The automatic movement remains discreet beneath the artistic façade, ensuring performance without distracting from the dial's visual impact. Produced in very limited quantities, it stands as a tribute to cultural legacy through refined watchmaking." [ref=e295]
