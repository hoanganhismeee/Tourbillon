        - generic [ref=e220]:
          - img "Grand complication reaches a dazzling peak in the 6300/403G-001, where extraordinary mechanical ambition meets equally lavish gem-setting. This is not simply a watch to be worn, but a statement of what Patek Philippe is capable of when technical virtuosity and decorative artistry are pushed to their highest level. Despite its opulence, there remains a sense of discipline beneath the surface, reminding you that true extravagance is most powerful when built upon genuine mastery." [ref=e223]
          - img "Few watches project such quiet authority as the 6301P-001, a piece defined by the gravitas of its grande sonnerie complication and the restraint of its platinum case. Rather than announcing itself through visual excess, it impresses through depth, rarity, and the knowledge of what it represents in traditional watchmaking. It feels almost ceremonial in nature, created for the collector who values acoustic complexity and horological significance above all else." [ref=e226]
          - img "Poetic in the truest sense, the 6102P-001 turns the night sky into the very soul of the watch. Its celestial display is less about practicality than wonder, tracing the motion of the heavens with an almost dreamlike elegance that sets it apart from more conventional complications. The platinum case reinforces its seriousness, yet the overall impression is one of romance, imagination, and a kind of quiet awe seldom found in watchmaking." [ref=e229]
          - img "The 5303R is Patek Philippe’s boldest expression of mechanical artistry, combining a minute repeater and visible tourbillon in a fully openworked dial. Launched in 2020, it’s the first Patek repeater to display its striking mechanism on the dial side—letting wearers admire the chiming hammers and rotating tourbillon in real time. Its rose and white gold hybrid case adds dynamic contrast, while the hollowed lugs and engraved caseband elevate its sculptural presence. Built in extremely limited numbers and rarely seen publicly, it offers a rare glimpse into the maison’s inner workings. Both an acoustic marvel and a visual spectacle, the 5303R departs from the brand’s usual restraint, celebrating transparency, innovation, and high horology with unapologetic flair. A true collector’s piece that pushes tradition forward without losing its soul." [ref=e232]
          - img "Warmth and transparency define the 5304/301R-001, where the traditional prestige of a minute repeater and retrograde perpetual calendar is transformed by an unusually open and expressive dial. In rose gold, the watch feels more intimate and luminous, allowing its mechanical sophistication to be admired rather than merely understood. It offers a rare combination of grandeur and visual accessibility, making an elite complication feel almost inviting." [ref=e235]
          - img "Dark, intricate, and deeply sophisticated, the 5316/50P-001 carries the aura of a grand complication in a more contemporary, almost mysterious register. The platinum case gives it weight and seriousness, while the openworked display reveals a world of mechanical architecture normally hidden from view. What makes it so striking is the way technical density becomes visual theatre, turning complexity itself into part of the watch’s emotional appeal." [ref=e238]
      - generic [ref=e68]:
        - generic [ref=e239]:
          - img "Warm and deeply luxurious, the 26730OR.OO.1320OR.05 gives the flying tourbillon a richer, more expressive stage. The rose gold amplifies the Royal Oak’s sculptural qualities, making the whole watch feel more fluid and more formal at the same time. It is bold, refined, and unmistakably high-end in the way only AP can be." [ref=e242]
          - img "The 26685XT.OO.1320XT.01 gives the perpetual calendar a strikingly contemporary voice, pairing a high complication with a cooler, more technical personality than the genre usually allows. What stands out is the sense of control, with so much mechanical sophistication carried inside a watch that still feels sharp, modern, and wearable. It is serious horology, filtered through AP’s futuristic lens." [ref=e245]
          - img [ref=e248]
          - img "Richly assertive in full yellow gold, the 26240BA.OO.1320BA.02 turns the Royal Oak chronograph into something almost celebratory. Its strength lies in that contrast between the collection’s sharp industrial lines and the warmth of precious metal, creating a watch that feels both sporty and unmistakably opulent. It is confident, iconic, and impossible to mistake for anything else." [ref=e251]
          - img "The 26674ST.OO.1320ST.01 is one of the cleanest expressions of modern AP complication design, taking the perpetual calendar and housing it within the pure familiarity of the steel Royal Oak. It feels technical, but never heavy-handed, with a balance that makes the complexity seem almost effortless. Elegant, iconic, and very collectible." [ref=e254]
          - img "Stealthy and highly contemporary, the 26591CE.OO.D002CA.02 channels the Royal Oak’s complexity into a darker, more tactical mood. Its strength is not in ornament, but in tension, matte surfaces, sharp lines, and a mechanical presence that feels purposeful rather than decorative. It is the kind of watch that projects confidence through control." [ref=e257]
